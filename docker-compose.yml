version: '3.9'
services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://187.124.80.32:8000/api

  api:
    image: php:8.4-cli
    working_dir: /var/www
    volumes:
      - ./apps/api:/var/www
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: obscribe
      POSTGRES_USER: obscribe
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - obscribe_db:/var/lib/postgresql/data

  redis:
    image: redis:7

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - obscribe_minio:/data

volumes:
  obscribe_db:
  obscribe_minio:
