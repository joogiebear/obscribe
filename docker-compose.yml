version: '3.9'
services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"

  api:
    image: php:8.3-fpm
    working_dir: /var/www
    volumes:
      - ./apps/api:/var/www

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: obscribe
      POSTGRES_USER: obscribe
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  redis:
    image: redis:7

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"