services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api

  api:
    build:
      context: ./apps/api
    working_dir: /var/www/html
    volumes:
      - ./apps/api/public:/var/www/html/public
    command: php -S 0.0.0.0:8000 -t public public/index.php
    ports:
      - "8000:8000"
    environment:
      APP_URL: http://localhost:3000
      PASSWORD_RESET_URL: http://localhost:3000
      PASSWORD_RESET_TTL_MINUTES: 60
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: obscribe
      DB_USERNAME: obscribe
      DB_PASSWORD: secret
      MAIL_MAILER: log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: obscribe
      POSTGRES_USER: obscribe
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - obscribe_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obscribe -d obscribe"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - obscribe_minio:/data

volumes:
  obscribe_db:
  obscribe_minio:
